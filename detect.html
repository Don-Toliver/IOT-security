<!DOCTYPE html>
<html>

<head>
    <title>IoT Intrusion Detection</title>
</head>

<body>

<h1>IoT Intrusion Detection System</h1>

<p><b>Status :</b> <span id="status">Loading...</span></p>

<p><b>Intrusion Count :</b> <span id="count">Loading...</span></p>

<script>

function loadData(){

fetch("https://api.thingspeak.com/channels/3417143/feeds/last.json?api_key=2TGFBV4T0BO6GGIA")
.then(response => response.json())
.then(data =>{

if(data.field1=="1"){
document.getElementById("status").innerHTML="🔴 Intrusion Detected";
}
else{
document.getElementById("status").innerHTML="🟢 Safe";
}

document.getElementById("count").innerHTML=data.field2;

});

}

loadData();

setInterval(loadData,15000);

</script>

</body>
</html>
